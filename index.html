<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>The Stationery Hub</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f7f9fc;
    }

    .hero {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 40px;
      gap: 40px;
      flex-wrap: wrap;
    }

    .hero-content {
      max-width: 520px;
    }

    .hero-content h1 {
      font-size: 42px;
      color: #1f2937;
    }

    .hero-content p {
      font-size: 16px;
      color: #4b5563;
      line-height: 1.6;
    }

    .hero-image {
      max-width: 420px;
    }

    .hero-image img {
      width: 100%;
      border-radius: 16px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.15);
    }

    @media (max-width: 768px) {
      .hero {
        flex-direction: column;
        text-align: center;
      }
    }
  </style>
</head>

<body>

  <section class="hero">
    <div class="hero-content">
      <h1>The Stationery Hub</h1>
      <p>
        Your trusted store for school and office stationery.
        Wholesale and retail supplies available at affordable prices.
      </p>
    </div>

    <!-- HERO IMAGE FROM GOOGLE DRIVE -->
    <div class="hero-image">
      <img 
        src="https://drive.google.com/uc?export=view&id=1Z913u3kgSJgZDCDs8YKR1XLRMTm6Hy9w"
        alt="The Stationery Hub Store">
    </div>
  </section>

</body>
</html>
